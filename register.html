<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Register.css">
</head>
<body class="FormContainer">
    
    <h1 class="Head">Course Form Filling</h1>

<div class="Div">

    <form class="Form" action="http://localhost:8080/students/form" method="post">


        <label for="Roll">Enter the Roll.no</label>
        <input type="number" placeholder="enter the roll.no" name="rno" id="Roll">

        <label for="Name">Enter name</label>
        <input type="text" placeholder="enter the name" name="name" id="Name">

        <label for="Technology">Enter the Technology</label>
        <input type="text" placeholder="enter the tech" name="tech" id="Technology">    

        <label for="Gender">Enter the Gender</label>
        <input type="text" placeholder="enter the gender" name="gender" id="Gender">    

        <button type="submit" class="button">Submit</button>
    </form>

</div>

</body>
